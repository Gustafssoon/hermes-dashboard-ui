# ============================================================
# GitHub Actions workflow: deploy hermes-dashboard-custom
#
# Triggers: push to main
# Strategy: rsync static files to VPS as deploy-user, then validate
# and restart the canonical root-owned nginx proxy service.
#
# Required repository secrets:
#   VPS_HOST       - VPS IP or hostname (e.g. 185.x.x.x)
#   VPS_USER       - SSH user (must be "deploy")
#   VPS_PORT       - SSH port (e.g. 22)
#   VPS_SSH_KEY    - Private SSH key for deploy-user (ed25519 PEM)
#
# Runtime config:
#   Canonical nginx config is root-owned on VPS:
#     /etc/nginx/hermes-dashboard-proxy.conf
#   Static UI files are served from:
#     /opt/hermes-dashboard-custom/public
#
# Access control:
#   deploy user owns /opt/hermes-dashboard-custom
#   deploy user has passwordless sudo for exactly these commands:
#     /usr/sbin/nginx -t -c /etc/nginx/hermes-dashboard-proxy.conf
#     /usr/bin/systemctl restart hermes-dashboard-proxy.service
#     /usr/bin/systemctl is-active hermes-dashboard-proxy.service
#     /usr/bin/systemctl status hermes-dashboard-proxy.service
#   Everything else is blocked by sudoers policy.
# ============================================================

name: Deploy Hermes Dashboard UI

on:
  push:
    branches: [main]

env:
  DEPLOY_PATH: /opt/hermes-dashboard-custom

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync project files to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=yes" \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            "${{ github.workspace }}/" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${DEPLOY_PATH}/"

      - name: Verify canonical nginx config on VPS (sudo)
        run: |
          ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "sudo /usr/sbin/nginx -t -c /etc/nginx/hermes-dashboard-proxy.conf"

      - name: Restart dashboard proxy on VPS (sudo)
        run: |
          ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "sudo /usr/bin/systemctl restart hermes-dashboard-proxy.service && sudo /usr/bin/systemctl is-active hermes-dashboard-proxy.service && echo DEPLOY_OK"

      - name: Verify deployment with GET
        run: |
          ROOT_CODE=$(ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9120/")

          API_CODE=$(ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9120/api/status")

          echo "Root HTTP status: ${ROOT_CODE}"
          echo "API HTTP status: ${API_CODE}"

          if [ "${ROOT_CODE}" != "200" ]; then
            echo "ERROR: expected root 200, got ${ROOT_CODE}"
            exit 1
          fi

          if [ "${API_CODE}" != "200" ]; then
            echo "ERROR: expected API 200, got ${API_CODE}"
            exit 1
          fi
