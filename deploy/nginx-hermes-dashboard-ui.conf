# Hermes Dashboard Proxy - nginx

# Deployed by hermes-dashboard service or GitHub Actions.
# Serves static files from /opt/hermes-dashboard-custom/public/
# and proxies all API calls to Hermes Agent on 127.0.0.1:9119.

pid /run/hermes-dashboard-ui-nginx.pid;

events {
    worker_connections 64;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 127.0.0.1:9120;
        server_name hermes-dashboard.tingzel.lan;

        root /opt/hermes-dashboard-custom/public;
        index index.html;

        # --- Static files ---
        location /assets/ {
            try_files $uri $uri/ =404;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # --- Favicon ---
        location = /favicon.ico {
            try_files /assets/favicon.svg $uri =404;
        }

        # --- Theme API (proxied to Hermes) ---
        location /api/dashboard/ {
            proxy_pass http://127.0.0.1:9119;
            proxy_http_version 1.1;
            proxy_set_header Host 127.0.0.1:9119;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- WebSocket (proxied to Hermes) ---
        location /ws {
            proxy_pass http://127.0.0.1:9119;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host 127.0.0.1:9119;
            proxy_buffering off;
        }

        # --- Sessions API (proxied to Hermes) ---
        location /api/sessions {
            proxy_pass http://127.0.0.1:9119;
            proxy_http_version 1.1;
            proxy_set_header Host 127.0.0.1:9119;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Status API (proxied to Hermes) ---
        location = /api/status {
            proxy_pass http://127.0.0.1:9119;
            proxy_http_version 1.1;
            proxy_set_header Host 127.0.0.1:9119;
        }

        # --- All other API calls (proxied to Hermes) ---
        location /api/ {
            proxy_pass http://127.0.0.1:9119;
            proxy_http_version 1.1;
            proxy_set_header Host 127.0.0.1:9119;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- SPA fallback: serve index.html ---
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
