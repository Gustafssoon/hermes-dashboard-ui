<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>comp-linkmeter.html</title>

<div class="cap" style="margin-bottom:14px">Link row &amp; meter</div>
<div style="display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--border);border-radius:5px;background:var(--bg-card);margin-bottom:16px">
  <div style="width:30px;height:30px;border-radius:5px;display:grid;place-items:center;color:var(--fg2);background:var(--bg-sunken);border:1px solid var(--border)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg></div>

  <span style="color:var(--fg3)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span>
</div>
<div style="display:flex;align-items:center;gap:14px"><span class="cap" style="width:48px;color:var(--fg3)">Disk</span>
<div style="flex:1;height:6px;border-radius:3px;background:var(--bg-sunken);border:1px solid var(--line-faint);overflow:hidden"><i style="display:block;height:100%;width:68%;background:var(--warn)"></i></div>
<span style="font-family:var(--font-mono);font-size:13px;color:var(--fg1)">68%</span></div></body></html>
