<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>comp-status.html</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="cap" style="margin-bottom:16px">Status dots — color + a slow pulse for live</div>
<div style="display:flex;gap:28px;align-items:center">
  
  <div style="display:flex;align-items:center;gap:9px">
    <span class="dot" style="background:#8AA362;box-shadow:0 0 7px #8AA362"></span>
    <span style="font-size:13px;color:var(--fg2)">nominal</span>
  </div>
  <div style="display:flex;align-items:center;gap:9px">
    <span class="dot" style="background:#C9A961;box-shadow:0 0 7px #C9A961"></span>
    <span style="font-size:13px;color:var(--fg2)">attention</span>
  </div>
  <div style="display:flex;align-items:center;gap:9px">
    <span class="dot" style="background:#C25B4E;box-shadow:0 0 7px #C25B4E"></span>
    <span style="font-size:13px;color:var(--fg2)">down</span>
  </div>
  <div style="display:flex;align-items:center;gap:9px">
    <span class="dot" style="background:#6699B5;box-shadow:0 0 7px #6699B5"></span>
    <span style="font-size:13px;color:var(--fg2)">info</span>
  </div>
  <div style="display:flex;align-items:center;gap:9px">
    <span class="dot" style="background:#6E6A60;box-shadow:0 0 7px #6E6A60"></span>
    <span style="font-size:13px;color:var(--fg2)">idle</span>
  </div>
</div></body></html>
