<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>space-radii.html</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="cap" style="margin-bottom:16px">Corner radii · architectural, restrained</div>
<div style="display:flex;gap:22px;align-items:flex-end">
  
  <div style="text-align:center">
    <div style="width:74px;height:54px;background:var(--bg-raised);border:1px solid var(--border-strong);border-radius:3px"></div>
    <div class="cap mono" style="margin-top:8px;color:var(--fg2)">xs 3px</div>
  </div>
  <div style="text-align:center">
    <div style="width:74px;height:54px;background:var(--bg-raised);border:1px solid var(--border-strong);border-radius:5px"></div>
    <div class="cap mono" style="margin-top:8px;color:var(--fg2)">sm 5px</div>
  </div>
  <div style="text-align:center">
    <div style="width:74px;height:54px;background:var(--bg-raised);border:1px solid var(--border-strong);border-radius:8px"></div>
    <div class="cap mono" style="margin-top:8px;color:var(--fg2)">md 8px</div>
  </div>
  <div style="text-align:center">
    <div style="width:74px;height:54px;background:var(--bg-raised);border:1px solid var(--border-strong);border-radius:12px"></div>
    <div class="cap mono" style="margin-top:8px;color:var(--fg2)">lg 12px</div>
  </div>
  <div style="text-align:center">
    <div style="width:74px;height:34px;background:var(--bg-raised);border:1px solid var(--border-strong);border-radius:999px"></div>
    <div class="cap mono" style="margin-top:8px;color:var(--fg2)">pill</div>
  </div>
</div></body></html>
