<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tingzel Pantheon — Operations Console</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/pantheon.css" />
</head>
<body>
<div id="app" class="pantheon-root">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-glyph"></div>
      <div class="brand-text">
        <span class="brand-name">Tingzel <em>Pantheon</em></span>
        <span class="brand-tag">Operations Console</span>
      </div>
    </div>
    <div class="nav-group-label">Pantheon</div>
    <button class="nav-item active" data-section="athena">
      <span class="nav-icon"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg></span>
      <span class="nav-label"><span class="nav-deity">Athena</span><span class="nav-fn">Overview</span></span>
      <span class="nav-attention-dot" id="nav-attention-dot" hidden></span>
    </button>
    <button class="nav-item" data-section="hermes">
      <span class="nav-icon"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/><path d="m21.854 2.147-10.94 10.939"/></svg></span>
      <span class="nav-label"><span class="nav-deity">Hermes</span><span class="nav-fn">Links & routing</span></span>
    </button>
    <button class="nav-item" data-section="hephaestus">
      <span class="nav-icon"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2.97 12.92A2 2 0 0 0 2 14.63v3.24a2 2 0 0 0 .97 1.71l3 1.8a2 2 0 0 0 2.06 0L12 19v-5.5l-5-3-4.03 2.42Z"/><path d="m7 16.5-4.74-2.85"/><path d="m7 16.5 5-3"/><path d="M7 16.5v5.17"/><path d="M12 13.5V19l3.97 2.38a2 2 0 0 0 2.06 0l3-1.8a2 2 0 0 0 .97-1.71v-3.24a2 2 0 0 0-.97-1.71L17 10.5l-5 3Z"/><path d="m17 16.5-5-3"/><path d="m17 16.5 4.74-2.85"/><path d="M17 16.5v5.17"/><path d="M7.97 4.42A2 2 0 0 0 7 6.13v4.37l5 3 5-3V6.13a2 2 0 0 0-.97-1.71l-3-1.8a2 2 0 0 0-2.06 0l-3 1.8Z"/><path d="M12 8 7.26 5.15"/><path d="m12 8 4.74-2.85"/><path d="M12 13.5V8"/></svg></span>
      <span class="nav-label"><span class="nav-deity">Hephaestus</span><span class="nav-fn">Infrastructure</span></span>
    </button>
    <button class="nav-item" data-section="oracle">
      <span class="nav-icon"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0Z"/><circle cx="12" cy="12" r="3"/></svg></span>
      <span class="nav-label"><span class="nav-deity">Oracle</span><span class="nav-fn">Checks & signals</span></span>
    </button>
    <button class="nav-item" data-section="aegis">
      <span class="nav-icon"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg></span>
      <span class="nav-label"><span class="nav-deity">Aegis</span><span class="nav-fn">Backup & protection</span></span>
    </button>
    <button class="nav-item" data-section="scrolls">
      <span class="nav-icon"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M15 12h-5"/><path d="M15 8h-5"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/><path d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2a1 1 0 0 0 1 1h3"/></svg></span>
      <span class="nav-label"><span class="nav-deity">Scrolls</span><span class="nav-fn">Runbooks</span></span>
    </button>
    <div class="sidebar-foot">
      <button class="incident-btn" id="incident-btn">
        <svg class="icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        Incident mode
      </button>
      <div class="conn">
        <span class="status-dot dot-ok pulse" id="conn-dot"></span>
        <span id="conn-text">Connecting...</span>
        <span class="version" id="conn-version"></span>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-titles">
        <div class="eyebrow" id="topbar-eyebrow">Athena · Overview</div>
        <h1 id="topbar-title">Athena</h1>
      </div>
      <div class="topbar-right">
        <span class="sync-badge" id="sync-badge">
          <svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"></polyline></svg>
          <span id="sync-text">syncing...</span>
        </span>
        <button class="btn btn-ghost" id="refresh-btn" title="Refresh">
          <svg class="icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        </button>
      </div>
    </header>
    <div class="content" id="content">
      <!-- Section content injected by JS -->
    </div>
  </main>

  <!-- Incident overlay -->
  <div class="overlay" id="incident-overlay" hidden>
    <div class="incident-panel" id="incident-panel">
      <div class="incident-head">
        <span class="ih-ic"><svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></span>
        <div>
          <h2 id="incident-title">Start here when something is down</h2>
          <div class="ih-line" id="incident-line">Work top to bottom. Stop when you find the break.</div>
        </div>
        <span class="ih-close"><button class="btn btn-ghost" id="incident-close"><svg class="icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></span>
      </div>
      <div class="incident-steps" id="incident-steps">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

</div>

<script src="/assets/dashboard.js"></script>
</body>
</html>
