<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Hermes Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/dashboard.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo">HERMES</span>
        <span class="subtitle">Dashboard</span>
      </div>
      <div class="topbar-right">
        <span id="status-indicator" class="status-dot" title="Connecting..."></span>
        <span id="status-text" class="status-text">Connecting...</span>
        <span id="version" class="version"></span>
      </div>
    </header>

    <main class="dashboard">
      <section class="card card-status">
        <h2>System Status</h2>
        <div id="status-grid" class="status-grid">
          <div class="status-item">
            <span class="label">Version</span>
            <span id="val-version" class="value">--</span>
          </div>
          <div class="status-item">
            <span class="label">Release</span>
            <span id="val-release" class="value">--</span>
          </div>
          <div class="status-item">
            <span class="label">Gateway</span>
            <span id="val-gateway" class="value">--</span>
          </div>
          <div class="status-item">
            <span class="label">Active Sessions</span>
            <span id="val-sessions" class="value">--</span>
          </div>
          <div class="status-item">
            <span class="label">Auth Required</span>
            <span id="val-auth" class="value">--</span>
          </div>
          <div class="status-item">
            <span class="label">Config Version</span>
            <span id="val-config" class="value">--</span>
          </div>
        </div>
      </section>

      <section class="card card-sessions">
        <h2>Active Sessions</h2>
        <div id="sessions-list" class="sessions-list">
          <p class="empty">Loading...</p>
        </div>
      </section>

      <section class="card card-themes">
        <h2>Theme</h2>
        <div id="theme-selector" class="theme-selector">
          <p class="empty">Loading themes...</p>
        </div>
      </section>

      <section class="card card-plugins">
        <h2>Dashboard Plugins</h2>
        <div id="plugins-list" class="plugins-list">
          <p class="empty">Loading...</p>
        </div>
      </section>

      <section class="card card-raw">
        <h2>Raw API Response</h2>
        <pre id="raw-json" class="raw-json">{}</pre>
      </section>
    </main>

    <footer class="footer">
      <span>Hermes Agent Dashboard &mdash; Custom UI</span>
    </footer>
  </div>

  <script src="/assets/dashboard.js"></script>
</body>
</html>
